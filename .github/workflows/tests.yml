# This workflow will install Python dependencies, run tests and lint with uv
# For more information see: https://help.github.com/actions/language-guides/using-python-with-github-actions

name: tests

on:
  pull_request:
    branches: [master, develop]

  push:
    branches: [master, develop]

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    services:
      rmq:
        image: rabbitmq
        ports: ["5672:5672"]
      redis:
        image: redis
        ports: ["6379:6379"]

    steps:
      - name: Checkout changes
        uses: actions/checkout@main

      - name: Sleep 2s to make services start
        run: sleep 2

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync --extra tests

      - name: Check types
        run: uv run pyrefly check

      - name: Check code
        run: uv run ruff check donald

      - name: Test with Pytest
        run: uv run pytest tests
